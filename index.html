<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        script: ['Great Vibes', 'cursive'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        // Custom Dusty Blue Palette
                        envelopeBase: '#9cb4d4',
                        envelopeDark: '#8a9fbc',
                        envelopeSide: '#95aac6',
                        // Santorini Blue for accents
                        santorini: '#1d3e8e',
                        offwhite: '#faf9f6'
                    }
                }
            }
        }
    </script>
    <style>
        /* 3D Envelope Animations */
        .flap-open {
            transform: rotateX(180deg);
            z-index: 0 !important;
        }
        .envelope-fade {
            opacity: 0;
            transform: translateY(100px) scale(0.95);
            pointer-events: none;
        }
        .card-reveal {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }
        
        /* Realistic Melted Wax Seal Styling */
        .wax-seal {
            /* Rich radial gradient to simulate 3D light reflection */
            background: radial-gradient(circle at 30% 30%, #ffe066 0%, #d4af37 40%, #997a00 80%, #665200 100%);
            /* Slightly irregular border-radius for a melted wax look */
            border-radius: 52% 48% 51% 49% / 51% 49% 52% 48%;
            /* Deep shadows to lift it off the envelope and create the outer melted ring */
            box-shadow: 
                inset 0 0 15px rgba(102, 82, 0, 0.8), /* Inner dark edge */
                inset 2px 2px 5px rgba(255, 255, 255, 0.5), /* Top left highlight */
                0 8px 20px rgba(0,0,0,0.4), /* Heavy drop shadow */
                0 0 0 3px rgba(212, 175, 55, 0.9), /* First gold ring */
                0 0 0 6px rgba(184, 134, 11, 0.8); /* Outer melted lip */
            border: none;
        }
        
        /* The indented ring caused by the physical stamp */
        .wax-seal-indent {
            position: absolute;
            inset: 8px;
            border: 2px solid rgba(102, 82, 0, 0.5);
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.3), 0 1px 2px rgba(255,255,255,0.4);
        }
        
        /* Paper Texture for Envelope Body */
        .paper-texture {
            background-color: #9cb4d4;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-offwhite text-zinc-800 font-sans antialiased overflow-hidden selection:bg-envelopeDark selection:text-white">

    <div id="envelope-screen" class="fixed inset-0 z-50 overflow-hidden transition-all duration-1000 paper-texture">
        
        <div class="absolute top-0 left-0 w-0 h-full border-y-[50vh] border-l-[50vw] border-y-transparent border-l-envelopeSide z-10 pointer-events-none drop-shadow-sm"></div>
        <div class="absolute top-0 right-0 w-0 h-full border-y-[50vh] border-r-[50vw] border-y-transparent border-r-envelopeSide z-10 pointer-events-none drop-shadow-sm"></div>
        
        <div class="absolute bottom-0 left-0 w-full h-0 border-x-[50vw] border-b-[60vh] border-x-transparent border-b-envelopeBase z-10 pointer-events-none drop-shadow-xl"></div>
        
        <div id="top-flap" class="absolute top-0 left-0 w-full h-0 border-x-[50vw] border-t-[55vh] border-x-transparent border-t-envelopeDark z-20 origin-top transition-transform duration-700 ease-in-out"></div>
        
        <div id="seal-cluster" class="absolute left-1/2 top-[55%] -translate-x-1/2 -translate-y-1/2 z-30 flex flex-col items-center justify-center transition-all duration-300 w-full">
            
            <button onclick="openInvite()" class="w-36 h-36 relative flex items-center justify-center wax-seal cursor-pointer transition-transform duration-300 hover:scale-105 active:scale-95 group">
                <div class="wax-seal-indent"></div>
                <span class="text-[#fef2cd] font-script text-6xl mt-2 drop-shadow-[0_2px_4px_rgba(50,30,0,0.9)] group-hover:scale-110 transition-transform duration-300 z-10 relative font-bold tracking-widest">N&L</span>
            </button>

            <p class="mt-12 text-[#d4af37] font-script text-4xl md:text-5xl tracking-widest opacity-100 drop-shadow-[0_2px_3px_rgba(0,0,0,0.3)] text-center px-4 leading-normal font-bold">
                This invitation is<br>exclusively for you
            </p>
        </div>

        <p id="tap-text" class="absolute bottom-8 left-0 w-full text-center text-envelopeDark text-xs tracking-[0.2em] uppercase font-sans z-30 pointer-events-none transition-opacity duration-300 font-bold">Tap seal to open</p>
    </div>


    <div id="static-graphic" class="fixed bottom-0 left-0 w-full h-[50vh] flex items-end justify-center z-0 opacity-0 transition-opacity duration-1000 delay-500 pointer-events-none">
        <img src="image.webp" alt="Santorini Graphics" class="w-full max-w-md object-contain object-bottom drop-shadow-2xl">
    </div>

    <div id="details-screen" class="relative z-10 h-screen overflow-y-auto opacity-0 translate-y-10 transition-all duration-1000 delay-300 hidden">
        
        <div class="bg-offwhite w-full max-w-md mx-auto rounded-b-[3rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] pb-16 border-b-2 border-zinc-100">
            
            <div class="text-center pt-20 px-8">
                <p class="text-xs uppercase tracking-[0.3em] text-zinc-500 mb-6">We're getting married</p>
                <h1 class="text-5xl font-serif text-zinc-900 leading-tight mb-4">
                    <span class="font-script text-santorini">Nadine</span> & <span class="font-script text-santorini">Lucas</span>
                </h1>
                
                <div class="flex items-center justify-center gap-4 my-8">
                    <div class="h-[1px] w-12 bg-zinc-300"></div>
                    <div class="w-2 h-2 rotate-45 bg-[#d4af37]"></div>
                    <div class="h-[1px] w-12 bg-zinc-300"></div>
                </div>

                <p class="text-lg font-serif tracking-widest text-zinc-700 font-script text-santorini text-3xl">June 14th, 2026</p>
            </div>

            <div class="mt-16 px-8 text-center space-y-12">
                <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-zinc-400 mb-3">The Ceremony</p>
                    <h2 class="text-3xl font-serif text-zinc-900">St. Mary's Church</h2>
                    <p class="text-[#d4af37] mt-2 font-serif text-xl">♥</p>
                </div>

                <div>
                    <h3 class="text-4xl font-serif text-zinc-900">12:00 PM</h3>
                    <p class="text-xs uppercase tracking-[0.2em] text-zinc-400 mt-2">Arrival Time</p>
                </div>

                <div>
                    <p class="text-sm font-sans text-zinc-600 leading-relaxed">
                        <span class="text-santorini mr-1 font-bold">📍</span> 15 Main Street<br>
                        London, United Kingdom
                    </p>
                </div>
            </div>

            <div class="mt-20 px-6">
                <div class="bg-white p-8 rounded-2xl border border-zinc-100 shadow-sm">
                    <h2 class="text-2xl font-serif text-center mb-6 text-zinc-900">RSVP</h2>
                    
                    <form action="https://formsubmit.co/YOUR_EMAIL@HERE.COM" method="POST" class="space-y-5">
                        <input type="hidden" name="_subject" value="New Wedding RSVP!">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_cc" value="ORGANIZER_EMAIL@HERE.COM">
                        
                        <div>
                            <input type="text" name="Names" placeholder="Guest Name(s)" required class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-santorini outline-none font-sans text-sm transition-colors">
                        </div>

                        <div>
                            <select name="Plus_One" class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-santorini outline-none font-sans text-sm text-zinc-500 transition-colors">
                                <option value="" disabled selected>Bringing a Plus One?</option>
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>

                        <div>
                            <input type="text" name="Dietary_Requirements" placeholder="Dietary Requirements (e.g. Vegan)" class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-santorini outline-none font-sans text-sm transition-colors">
                        </div>

                        <div class="pt-4 space-y-3">
                            <label class="flex items-center space-x-3 cursor-pointer p-3 border border-zinc-200 rounded-lg hover:border-santorini transition-colors">
                                <input type="radio" name="Attending" value="Yes" required class="w-4 h-4 text-santorini accent-santorini">
                                <span class="font-serif text-zinc-700">Joyfully Accepts</span>
                            </label>
                            <label class="flex items-center space-x-3 cursor-pointer p-3 border border-zinc-200 rounded-lg hover:border-santorini transition-colors">
                                <input type="radio" name="Attending" value="No" class="w-4 h-4 text-santorini accent-santorini">
                                <span class="font-serif text-zinc-700">Regretfully Declines</span>
                            </label>
                        </div>

                        <button type="submit" class="w-full bg-santorini text-white font-serif tracking-widest uppercase py-4 rounded-lg hover:bg-[#152c66] transition-colors mt-6 text-sm shadow-md">
                            Send Reply
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="h-[45vh] w-full pointer-events-none"></div>

    </div>

    <script>
        function openInvite() {
            const envelopeScreen = document.getElementById('envelope-screen');
            const topFlap = document.getElementById('top-flap');
            const sealCluster = document.getElementById('seal-cluster');
            const tapText = document.getElementById('tap-text');
            
            const detailsScreen = document.getElementById('details-screen');
            const staticGraphic = document.getElementById('static-graphic');
            
            // 1. Fade out the wax seal and text immediately
            sealCluster.style.opacity = '0';
            tapText.style.opacity = '0';
            
            // 2. Open the envelope flap in 3D
            topFlap.classList.add('flap-open');

            // 3. Drop the whole envelope away and reveal the invite
            setTimeout(() => {
                envelopeScreen.classList.add('envelope-fade');
                document.body.classList.remove('overflow-hidden');
                
                detailsScreen.classList.remove('hidden');
                
                // Allow a tiny delay for the 'hidden' class removal to register in the browser
                setTimeout(() => {
                    detailsScreen.classList.add('card-reveal');
                    staticGraphic.classList.remove('opacity-0');
                }, 50);

            }, 800);
            
            // Cleanup DOM later
            setTimeout(() => {
                envelopeScreen.classList.add('hidden');
            }, 2000);
        }
    </script>
</body>
</html>
