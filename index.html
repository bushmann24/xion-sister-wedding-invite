<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        script: ['Great Vibes', 'cursive'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        olive: '#6e7f5e',
                        oliveDark: '#5a6a4c',
                        oliveLight: '#7a8a69',
                        gold: '#d4af37',
                        offwhite: '#faf9f6'
                    }
                }
            }
        }
    </script>
    <style>
        /* 3D Envelope Animations */
        .flap-open {
            transform: rotateX(180deg);
            z-index: 0 !important;
        }
        .envelope-fade {
            opacity: 0;
            transform: translateY(100px) scale(0.95);
            pointer-events: none;
        }
        .card-reveal {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }
        
        /* Wax Seal Style */
        .wax-seal {
            box-shadow: 
                inset 0 0 8px rgba(0,0,0,0.1), 
                0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-offwhite text-zinc-800 font-sans antialiased overflow-hidden selection:bg-olive selection:text-white">

    <div id="envelope-screen" class="fixed inset-0 z-50 bg-olive overflow-hidden transition-all duration-1000">
        
        <div class="absolute top-0 left-0 w-0 h-full border-y-[50vh] border-l-[50vw] border-y-transparent border-l-[#657556] z-10 pointer-events-none"></div>
        <div class="absolute top-0 right-0 w-0 h-full border-y-[50vh] border-r-[50vw] border-y-transparent border-r-[#657556] z-10 pointer-events-none"></div>
        
        <div class="absolute bottom-0 left-0 w-full h-0 border-x-[50vw] border-b-[60vh] border-x-transparent border-b-olive z-10 pointer-events-none drop-shadow-2xl"></div>
        
        <div id="top-flap" class="absolute top-0 left-0 w-full h-0 border-x-[50vw] border-t-[55vh] border-x-transparent border-t-oliveDark z-20 origin-top transition-transform duration-700 ease-in-out"></div>
        
        <div id="seal" onclick="openInvite()" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-30 w-24 h-24 bg-[#fdfbf7] rounded-full flex items-center justify-center wax-seal cursor-pointer transition-all duration-300 hover:scale-105 active:scale-95 group">
            <span class="text-gold font-script text-4xl mt-2 group-hover:scale-110 transition-transform duration-300">N&L</span>
        </div>

        <p id="tap-text" class="absolute bottom-12 left-0 w-full text-center text-white/60 text-xs tracking-[0.2em] uppercase font-sans z-30 pointer-events-none transition-opacity duration-300">Tap seal to open</p>
    </div>


    <div id="static-graphic" class="fixed bottom-0 left-0 w-full h-[45vh] flex items-end justify-center z-0 opacity-0 transition-opacity duration-1000 delay-500 pointer-events-none">
        <img src="YOUR_CUSTOM_IMAGE.webp" alt="Wedding Graphic" class="w-full max-w-md object-contain drop-shadow-2xl">
    </div>

    <div id="details-screen" class="relative z-10 h-screen overflow-y-auto opacity-0 translate-y-10 transition-all duration-1000 delay-300 hidden">
        
        <div class="bg-offwhite w-full max-w-md mx-auto rounded-b-[3rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] pb-16">
            
            <div class="text-center pt-20 px-8">
                <p class="text-xs uppercase tracking-[0.3em] text-zinc-500 mb-6">We're getting married</p>
                <h1 class="text-5xl font-serif text-zinc-900 leading-tight mb-4">Nadine <span class="text-3xl font-script text-olive mx-2">&</span> Lucas</h1>
                
                <div class="flex items-center justify-center gap-4 my-8">
                    <div class="h-[1px] w-12 bg-zinc-300"></div>
                    <div class="w-2 h-2 rotate-45 bg-gold"></div>
                    <div class="h-[1px] w-12 bg-zinc-300"></div>
                </div>

                <p class="text-lg font-serif tracking-widest text-zinc-700">June 14th, 2026</p>
            </div>

            <div class="mt-16 px-8 text-center space-y-12">
                <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-zinc-400 mb-3">The Ceremony</p>
                    <h2 class="text-3xl font-serif text-zinc-900">St. Mary's Church</h2>
                    <p class="text-gold mt-2 font-serif text-xl">♥</p>
                </div>

                <div>
                    <h3 class="text-4xl font-serif text-zinc-900">12:00 PM</h3>
                    <p class="text-xs uppercase tracking-[0.2em] text-zinc-400 mt-2">Arrival Time</p>
                </div>

                <div>
                    <p class="text-sm font-sans text-zinc-600 leading-relaxed">
                        <span class="text-red-800 mr-1">📍</span> 15 Main Street<br>
                        London, United Kingdom
                    </p>
                </div>
            </div>

            <div class="mt-20 px-6">
                <div class="bg-white p-8 rounded-2xl border border-zinc-100 shadow-sm">
                    <h2 class="text-2xl font-serif text-center mb-6 text-zinc-900">RSVP</h2>
                    
                    <form action="https://formsubmit.co/YOUR_EMAIL@HERE.COM" method="POST" class="space-y-5">
                        <input type="hidden" name="_subject" value="New Wedding RSVP!">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_cc" value="ORGANIZER_EMAIL@HERE.COM">
                        
                        <div>
                            <input type="text" name="Names" placeholder="Guest Name(s)" required class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-olive outline-none font-sans text-sm transition-colors">
                        </div>

                        <div>
                            <select name="Plus_One" class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-olive outline-none font-sans text-sm text-zinc-500 transition-colors">
                                <option value="" disabled selected>Bringing a Plus One?</option>
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>

                        <div>
                            <input type="text" name="Dietary_Requirements" placeholder="Dietary Requirements (e.g. Vegan)" class="w-full p-3 bg-transparent border-b border-zinc-300 focus:border-olive outline-none font-sans text-sm transition-colors">
                        </div>

                        <div class="pt-4 space-y-3">
                            <label class="flex items-center space-x-3 cursor-pointer p-3 border border-zinc-200 rounded-lg hover:border-olive transition-colors">
                                <input type="radio" name="Attending" value="Yes" required class="w-4 h-4 text-olive accent-olive">
                                <span class="font-serif text-zinc-700">Joyfully Accepts</span>
                            </label>
                            <label class="flex items-center space-x-3 cursor-pointer p-3 border border-zinc-200 rounded-lg hover:border-olive transition-colors">
                                <input type="radio" name="Attending" value="No" class="w-4 h-4 text-olive accent-olive">
                                <span class="font-serif text-zinc-700">Regretfully Declines</span>
                            </label>
                        </div>

                        <button type="submit" class="w-full bg-olive text-white font-serif tracking-widest uppercase py-4 rounded-lg hover:bg-oliveDark transition-colors mt-6 text-sm">
                            Send Reply
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="h-[40vh] w-full pointer-events-none"></div>

    </div>

    <script>
        function openInvite() {
            const envelopeScreen = document.getElementById('envelope-screen');
            const topFlap = document.getElementById('top-flap');
            const seal = document.getElementById('seal');
            const tapText = document.getElementById('tap-text');
            
            const detailsScreen = document.getElementById('details-screen');
            const staticGraphic = document.getElementById('static-graphic');
            
            // 1. Fade out the wax seal and text immediately
            seal.style.opacity = '0';
            tapText.style.opacity = '0';
            
            // 2. Open the envelope flap in 3D
            topFlap.classList.add('flap-open');

            // 3. Drop the whole envelope away and reveal the invite
            setTimeout(() => {
                envelopeScreen.classList.add('envelope-fade');
                document.body.classList.remove('overflow-hidden');
                
                detailsScreen.classList.remove('hidden');
                
                // Allow a tiny delay for the 'hidden' class removal to register in the browser
                setTimeout(() => {
                    detailsScreen.classList.add('card-reveal');
                    staticGraphic.classList.remove('opacity-0');
                }, 50);

            }, 800);
            
            // Cleanup DOM later
            setTimeout(() => {
                envelopeScreen.classList.add('hidden');
            }, 2000);
        }
    </script>
</body>
</html>
